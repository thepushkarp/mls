name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: macos-latest
    permissions:
      contents: write
    strategy:
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          key: ${{ matrix.target }}
          save-if: false

      - name: Build
        env:
          TARGET: ${{ matrix.target }}
        run: cargo build --release --locked --target "${TARGET}"

      - name: Package
        env:
          TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          ARCHIVE="mls-${TAG}-${TARGET}.tar.gz"
          tar czf "${ARCHIVE}" -C "target/${TARGET}/release" mls -C "${GITHUB_WORKSPACE}" README.md LICENSE
          shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload to release
        uses: softprops/action-gh-release@5be0e66d93ac7ed76da52eca8bb058f665c3a5fe # v2.4.2
        with:
          generate_release_notes: true
          files: |
            mls-*.tar.gz
            mls-*.tar.gz.sha256

  publish-crate:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked

  update-tap:
    name: Update Homebrew tap
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download sha256 files
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          gh release download "${TAG}" \
            --repo "${REPO}" \
            --pattern "*.sha256"

      - name: Read checksums and dispatch
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${TAG#v}"
          AARCH64_SHA256=$(awk '{print $1}' "mls-${TAG}-aarch64-apple-darwin.tar.gz.sha256")
          X86_64_SHA256=$(awk '{print $1}' "mls-${TAG}-x86_64-apple-darwin.tar.gz.sha256")

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            repos/thepushkarp/homebrew-tap/dispatches \
            -f "event_type=mls-release" \
            -f "client_payload[version]=${VERSION}" \
            -f "client_payload[aarch64_sha256]=${AARCH64_SHA256}" \
            -f "client_payload[x86_64_sha256]=${X86_64_SHA256}"
